topic_author_badge_enable_desktop:
  default: true
  description:
    en: "Show the topic author badge on desktop."
    zh_CN: "是否在桌面端显示话题作者标签。"
topic_author_badge_enable_mobile:
  default: true
  description:
    en: "Show the topic author badge on mobile."
    zh_CN: "是否在移动端显示话题作者标签。"
topic_author_badge_label_desktop:
  default: "楼主"
  description:
    en: "Label shown on desktop for the topic author's posts."
    zh_CN: "桌面端显示在话题作者帖子上的标签文字。"
topic_author_badge_label_mobile:
  default: "楼主"
  description:
    en: "Label shown on mobile for the topic author's posts."
    zh_CN: "移动端显示在话题作者帖子上的标签文字。"
topic_author_badge_show_on_first_post:
  default: false
  description:
    en: "Show the badge on the first post as well. Disabled by default because the first post is already visually the topic author's post."
    zh_CN: "是否也在首帖显示标签。默认关闭，因为首帖本身已经是话题作者的帖子。"
topic_author_badge_location_desktop:
  type: enum
  default: "below-user-avatar"
  choices:
    - after-user-names
    - below-user-names
    - below-user-avatar
  description:
    en: "Badge position on desktop."
    zh_CN: "桌面端标签位置。"
topic_author_badge_location_mobile:
  type: enum
  default: "below-user-avatar"
  choices:
    - after-user-names
    - below-user-names
    - below-user-avatar
  description:
    en: "Badge position on mobile. These options use stable anchors in the current Discourse mobile DOM."
    zh_CN: "移动端标签位置。这些选项使用当前 Discourse 移动端 DOM 中较稳定的锚点。"
topic_author_badge_style_preset:
  type: enum
  default: "original"
  choices:
    - original
    - capsule
    - subtle
    - solid
    - custom
  description:
    en: "Badge style preset. original matches the upstream component, capsule uses the rounded style from this fork, subtle is a quiet light badge, solid is a stronger filled badge, custom uses the color/radius settings below."
    zh_CN: "标签外观预设。original 使用原作者外观，capsule 使用圆角胶囊外观，subtle 是低调浅色标签，solid 是醒目实心标签，custom 使用下方颜色/圆角设置。"
topic_author_badge_background:
  default: "var(--primary-high-or-secondary-low)"
  description:
    en: "Badge background color."
    zh_CN: "标签背景色。"
topic_author_badge_text_color:
  default: "var(--secondary)"
  description:
    en: "Badge text color."
    zh_CN: "标签文字颜色。"
topic_author_badge_border_color:
  default: "transparent"
  description:
    en: "Badge border color."
    zh_CN: "标签边框颜色。"
topic_author_badge_border_radius:
  default: "8px"
  description:
    en: "Badge border radius."
    zh_CN: "标签圆角。"
topic_author_badge_font_style:
  type: enum
  default: "normal"
  choices:
    - normal
    - bold
    - italic
    - bold-italic
  description:
    en: "Badge font style."
    zh_CN: "标签字体样式。"
topic_author_badge_category_overrides:
  default: ""
  type: list
  description:
    en: "Optional advanced overrides. Format: category-slug:desktop-label:mobile-label. One rule per item. Example: support:Author:OP. Leave empty to use the global labels."
    zh_CN: "可选高级分类覆盖。格式：分类-slug:桌面标签:移动标签。每项一条规则。例如：support:Author:OP。留空则使用全局标签。"
